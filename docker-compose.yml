services:
  backend:
    image: fraolbmax/guzolink-backend:latest
    container_name: guzolink-backend
    restart: unless-stopped
    volumes:
      - uploads_data:/app/uploads
    env_file:
      - /home/fraol/secrets/guzolink-app.env

    depends_on:
      - mongodb

    ports:
      - "127.0.0.1:5000:5000"

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    image: fraolbmax/guzolink-frontend:latest
    container_name: guzolink-frontend
    restart: unless-stopped

    depends_on:
      - backend

    ports:
      - "127.0.0.1:3000:80"

  mongodb:
    image: mongo:latest
    container_name: guzolink-mongodb
    restart: unless-stopped

    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
  uploads_data: